<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Mis 15 Años en el Grand Line!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Pirata+One&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --oro: #ffd700;
            --azul-oscuro: #0c1020;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--azul-oscuro);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            /* Aquí cargamos tu imagen local */
            background-image: 
                linear-gradient(rgba(12, 16, 32, 0.7), rgba(12, 16, 32, 0.7)), 
                url('fondo.jpeg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
        }

        header { text-align: center; padding: 60px 20px; background: linear-gradient(to bottom, rgba(12, 16, 32, 0.6), transparent); }
        .jolly-roger-glam { width: 90px; filter: drop-shadow(0 0 15px var(--oro)); animation: flotar 3s ease-in-out infinite; }
        h1 { font-family: 'Pirata One', cursive; font-size: 4rem; color: var(--oro); margin: 10px 0 0 0; text-shadow: 0 0 20px rgba(255, 215, 0, 0.6), 3px 3px 0px #000; }
        .subtitulo { font-family: 'Cinzel', serif; font-size: 2rem; margin: 5px 0 20px 0; }
        
        .wrapper { max-width: 800px; margin: 0 auto; padding: 0 20px 60px 20px; }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px; padding: 35px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); text-align: center; }
        .card-title { font-family: 'Cinzel', serif; font-size: 1.6rem; color: var(--oro); margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .info-grid { text-align: left; font-size: 1.1rem; line-height: 1.8; }
        .info-line { margin: 15px 0; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .info-line strong { color: var(--oro); display: block; }
        
        .btn-action { display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 16px; font-weight: 600; font-size: 1.2rem; text-decoration: none; border-radius: 12px; margin-top: 15px; transition: 0.3s; cursor: pointer; }
        .btn-confirm { background: linear-gradient(135deg, #05c46b, #0be881); color: #0c1020; box-shadow: 0 5px 20px rgba(5, 196, 107, 0.4); }
        .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 0 20px #0be881; }
        
        @keyframes flotar { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        
        @media (max-width: 600px) { h1 { font-size: 2.5rem; } }
    </style>
</head>
<body>

    <header>
        <img class="jolly-roger-glam" src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Straw_Hat_Pirates_Flag.svg" alt="Jolly Roger">
        <h1>Mis 15 Años</h1>
        <div class="subtitulo">Anahí Lucía</div>
    </header>

    <div class="wrapper">
        <div class="card">
            <div class="card-title">📍 Coordenadas del Banquete</div>
            <div class="info-grid">
                <div class="info-line"><strong>FECHA:</strong> Sábado 22 de agosto</div>
                <div class="info-line"><strong>HORA:</strong> 2:30 pm a 10:00 pm</div>
                <div class="info-line"><strong>LUGAR:</strong> Local Contramaestre Dueñas, San Miguel</div>
                <div class="info-line"><strong>DRESS CODE:</strong> Elegante. <br> <span style="color: #ff6b6b; font-weight: bold;">*Colores no permitidos: Rojo y Beige*</span></div>
            </div>

            <a href="https://wa.me/51993540002?text=¡Hola!%20Confirmo%20mi%20asistencia%20al%20quinceañero%20de%20Anahí%20Lucía%20🏴‍☠️✨" class="btn-action btn-confirm" target="_blank">
                ✅ CONFIRMAR MI TRIPULACIÓN (WhatsApp)
            </a>
        </div>
    </div>
</body>
</html>
